name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Roda diariamente às 09:00 UTC (06:00 BRT) — detecta regressões em prod
    # mesmo sem push no repo. Comente esta linha se quiser só on-demand.
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright contra prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test
        # TEMPORÁRIO até 2026-05-12 (migração Plotly→Recharts):
        # 8 de 50 testes falham em CI Linux por timeout esperando Plotly
        # carregar contra prod (Plotly 4.8MB + network CI lento = TBT ~13s
        # vs timeout default 15s). Após Recharts, remover continue-on-error.
        continue-on-error: true

      - name: Upload test results (always, mesmo com continue-on-error acima)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
