name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Roda diariamente às 09:00 UTC (06:00 BRT) — detecta regressões em prod
    # mesmo sem push no repo. Comente esta linha se quiser só on-demand.
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright contra prod
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
